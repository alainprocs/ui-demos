name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

  screenshot:
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ secrets.DISPATCH_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Wait for Pages to propagate
        run: sleep 45

      - name: Take screenshots
        run: |
          cat > /tmp/screenshot.mjs << 'SCRIPT'
          import { chromium } from 'playwright';
          import { readFileSync } from 'fs';

          const demos = JSON.parse(readFileSync('public/demos.json', 'utf8'));
          const browser = await chromium.launch();
          const page = await browser.newPage();
          await page.setViewportSize({ width: 1280, height: 800 });

          for (const demo of demos) {
            const url = `https://alainprocs.github.io/ui-demos/${demo.slug}/`;
            try {
              await page.goto(url, { waitUntil: 'networkidle', timeout: 40000 });
              await page.waitForTimeout(2500); // let animations settle
              await page.screenshot({
                path: `/tmp/${demo.slug}.jpg`,
                type: 'jpeg',
                quality: 92,
                clip: { x: 0, y: 0, width: 1280, height: 800 },
              });
              console.log(`✓ ${demo.slug}`);
            } catch (e) {
              console.error(`✗ ${demo.slug}: ${e.message}`);
            }
          }

          await browser.close();
          SCRIPT
          node /tmp/screenshot.mjs

      - name: Push screenshots to portfolio repo
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          git clone \
            https://x-access-token:${GH_TOKEN}@github.com/alainprocs/portfolio.git \
            /tmp/portfolio-repo

          cd /tmp/portfolio-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          mkdir -p public/assets/images

          CHANGED=0
          for f in /tmp/*.jpg; do
            [ -f "$f" ] || continue
            slug=$(basename "$f" .jpg)
            dest="public/assets/images/${slug}.jpg"
            cp "$f" "$dest"
            git add "$dest"
            CHANGED=1
          done

          if [ "$CHANGED" = "0" ]; then
            echo "No screenshots produced — skipping commit"
          elif git diff --staged --quiet; then
            echo "Screenshots unchanged — no commit needed"
          else
            git commit -m "chore: update demo screenshots [skip ci]"
            # Remove [skip ci] on push so portfolio rebuild triggers
            git commit --amend --no-edit -m "chore: update demo screenshots"
            git push
          fi

  trigger-portfolio:
    needs: screenshot
    runs-on: ubuntu-latest
    # Belt-and-suspenders: if the screenshot push didn't trigger a rebuild
    # (e.g. images unchanged), this dispatch guarantees portfolio rebuilds.
    if: ${{ secrets.DISPATCH_TOKEN != '' }}
    steps:
      - name: Trigger portfolio rebuild
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/alainprocs/portfolio/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}'
