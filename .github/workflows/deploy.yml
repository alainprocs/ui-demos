name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

  trigger-portfolio:
    needs: deploy
    runs-on: ubuntu-latest
    # Requires secret DISPATCH_TOKEN with `workflow` scope on the portfolio repo.
    # Add at: github.com → alainprocs/ui-demos → Settings → Secrets → Actions → New secret
    if: ${{ secrets.DISPATCH_TOKEN != '' }}
    steps:
      - name: Trigger portfolio rebuild
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/alainprocs/portfolio/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}'
